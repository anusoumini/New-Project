<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { background-color: #121212; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .card { background-color: #1e1e1e; padding: 40px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 25px; font-size: 28px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #fff; box-sizing: border-box; font-size: 15px; }
        
        /* Message Styling */
        .flash-msg { padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px; }
        .error { background-color: #441111; color: #ff6666; border: 1px solid #ff4444; }
        .success { background-color: #113311; color: #66ff66; border: 1px solid #44ff44; }

        .captcha-container { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .captcha-box { background: #333; padding: 10px; border-radius: 6px; letter-spacing: 5px; font-weight: bold; color: #00ff00; flex: 1; margin-right: 10px; text-decoration: line-through; }
        .captcha-input { flex: 1; margin: 0; }

        .btn { width: 100%; padding: 12px; background-color: #ff4444; border: none; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 20px; transition: 0.2s; }
        .btn:hover { background-color: #e63e3e; }
        .link { color: #ff4444; text-decoration: none; display: block; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>

        <!-- Flash messages for errors or success -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-msg {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            
            <div class="captcha-container">
                <div class="captcha-box">{{ captcha }}</div>
                <input type="text" name="captcha" class="captcha-input" placeholder="Enter Captcha" required>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>
        <a href="/register" class="link">Don't have an account? Register</a>
    </div>
</body>
</html>
